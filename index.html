<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM-ConvRec 대화 시각화</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="chat-panel" aria-label="쇼핑 대화">
      <header class="panel-header">
        <div>
          <p class="eyebrow">쇼핑 대화</p>
          <h1>처음 사보는 태블릿</h1>
        </div>
        <div class="header-actions">
          <button class="ghost-button" type="button" id="copyButton" aria-label="대화 복사">복사</button>
          <button class="primary-button" type="button" id="finishButton">쇼핑 마치기</button>
        </div>
      </header>

      <div class="conversation" id="conversation" aria-live="polite"></div>

      <footer class="composer">
        <div class="quick-replies" aria-label="빠른 응답">
          <button type="button" data-jump="2">후기가 많은 게 좋아요</button>
          <button type="button" data-jump="3">사용 후기가 궁금해요</button>
          <button type="button" data-jump="5">첫 번째 제품을 볼게요</button>
        </div>
        <div class="input-shell">
          <span>무엇을 찾고 계세요?</span>
          <button type="button" aria-label="보내기">↑</button>
        </div>
        <p class="notice">AI 답변으로 정확하지 않은 정보가 포함될 수 있어요.</p>
      </footer>
    </section>

    <aside class="insight-panel" aria-label="파이프라인 이해 패널">
      <div class="insight-header">
        <div class="avatar" aria-hidden="true">AI</div>
        <div>
          <p class="eyebrow">제가 현제 이렇게 이해했어요.</p>
          <h2 id="insightTitle">기준을 파악하는 중이에요</h2>
        </div>
      </div>

      <p class="insight-summary" id="insightSummary"></p>

      <section class="understanding-card">
        <div class="card-topline">
          <span class="status-pill" id="statusPill">중요</span>
          <strong id="understandingLabel"></strong>
          <span id="turnCounter"></span>
        </div>
        <div class="feedback-row" aria-label="이해 확인">
          <button type="button">맞아요</button>
          <button type="button">아니에요</button>
        </div>
        <div class="state-tags" id="stateTags"></div>
      </section>

      <section class="pipeline-list" id="pipelineList" aria-label="파이프라인 단계 설명"></section>

      <section class="state-panel">
        <h3>누적된 추천 상태</h3>
        <dl id="stateSnapshot"></dl>
      </section>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
